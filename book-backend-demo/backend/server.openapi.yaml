openapi: 3.0.3
info:
  title: Server API (kong-demo/backend/server.js)
  version: 1.0.0
  description: Books API endpoints implemented by the Express backend server.
  contact:
    name: API Platform Team
    url: https://localhost:8443/books-api
servers:
  - url: https://localhost:8443/books-api
    description: Local development endpoint through the Kong proxy.
    x-internal: false
tags:
  - name: Health
    description: Service health checks.
  - name: Books
    description: Book catalog operations.
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns the service health status.
      operationId: health
      responses:
        "200":
          description: The service is healthy.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]
        "500":
          $ref: "#/components/responses/InternalServerError"
  /books:
    get:
      tags: [Books]
      summary: List books
      description: Returns all books currently held in memory by the service.
      operationId: listBooks
      responses:
        "200":
          description: A list of books.
          content:
            application/json:
              schema:
                type: array
                maxItems: 100
                items:
                  $ref: "#/components/schemas/Book"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Books]
      summary: Create a book
      description: Creates a new in-memory book entry.
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookRequest"
      responses:
        "201":
          description: The book was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /books/{id}:
    get:
      tags: [Books]
      summary: Get a book by id
      description: Returns a single book by numeric identifier.
      operationId: getBook
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric book identifier.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 2147483647
      responses:
        "200":
          description: The requested book.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  responses:
    BadRequest:
      description: The request is invalid or cannot be processed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: title and author required
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: not found
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Book:
      type: object
      required: [id, title, author]
      properties:
        id:
          type: integer
          format: int32
          minimum: 1
          maximum: 2147483647
        title:
          type: string
          minLength: 1
          maxLength: 255
          pattern: \S
        author:
          type: string
          minLength: 1
          maxLength: 255
          pattern: \S
    CreateBookRequest:
      type: object
      required: [title, author]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          pattern: \S
        author:
          type: string
          minLength: 1
          maxLength: 255
          pattern: \S
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          minLength: 1
          maxLength: 512
          pattern: \S
