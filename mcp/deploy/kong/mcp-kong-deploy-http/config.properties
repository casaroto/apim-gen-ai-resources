# Kong MCP server (HTTP/container) configuration
# Container-internal paths.

# Kong Admin API URL. From a podman container on macOS/Linux, host.containers.internal
# resolves to the host where Kong's admin port is published.
admin_url=http://host.containers.internal:8001

# Optional: Kong-Admin-Token for Konnect / Kong Enterprise. Empty for OSS.
admin_token=

request_timeout=30.0
working_dir=/opt/kong

# Defaults used by kong_apply_openapi if the call doesn't override them.
default_service_name=books-service
default_upstream_url=http://backend:3000
default_route_path=/books-api
