# Apigee MCP server (HTTP/container) operator notes.
# This file is informational only; runtime configuration is via env vars and
# config/mcp_config.json.
#
# Required at runtime:
#   BEARER_TOKEN  - Google OAuth access token with Apigee admin scope.
#                   Generate with: gcloud auth print-access-token
#                   Tokens expire (~1h); rotate before relaunch.
#
# Optional:
#   APIGEE_MCP_HOST   - bind host (default 0.0.0.0)
#   APIGEE_MCP_PORT   - bind port (default 8765)
#   CONFIG_PATH       - path to mcp_config.json inside the container
#                       (default /app/config/mcp_config.json)
#   MCP_SETTINGS      - JSON forwarded to FastMCP (overrides host/port)
#
# Apigee organization is part of each tool call (path parameter), not config.
