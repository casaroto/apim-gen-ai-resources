# IBM API Connect MCP server (HTTP/container) configuration
# Paths are container-internal.

apic_binary_path=/opt/apic/apic
working_dir=/opt/apic
credentials_file=credentials.json

server=
username=
password=
realm=provider/default-idp-2

catalog_url=
catalog_name=

default_product_file=branches_1.0.0.yaml

# Container has no trust for IBM Cloud's chain by default; macOS apic relies on Keychain.
insecure_skip_tls_verify=true
